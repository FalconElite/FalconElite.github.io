<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FalconElite | The Nest</title>
    <style>
        :root {
            --space-black: #080A10; 
            --imperial-panel: #1A1F2C; 
            --imperial-edge: #2E3648; 
            --deathstar-white: #F5F7FA;
            --text-dim: #94A3B8; 
            --accent-red: #FF334B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--space-black); 
            color: var(--deathstar-white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px; 
            display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 600px; text-align: center; }

        /* Logo Header */
        .logo-header { width: 100%; margin-bottom: 20px; }
        .brand-logo { 
            width: 150px; height: auto; 
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
            transition: transform 0.3s ease;
        }
        .brand-logo:hover { transform: scale(1.05); }

        /* Typography */
        h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
        .tagline { color: var(--text-dim); margin-bottom: 30px; line-height: 1.5; font-size: 0.95rem; }

        /* Responsive Twitch Container */
        .stream-wrapper { 
            position: relative; width: 100%; padding-top: 56.25%; 
            background: var(--imperial-panel); border: 1px solid var(--imperial-edge);
            border-radius: 8px; overflow: hidden; margin-bottom: 25px;
        }
        #twitch-embed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Links */
        .link-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            display: block; width: 100%; padding: 16px; background: var(--imperial-panel);
            border: 1px solid var(--imperial-edge); color: var(--deathstar-white); 
            text-decoration: none; border-radius: 6px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s;
        }
        .btn:hover { border-color: var(--deathstar-white); background: #222838; }
    </style>
</head>
<body>

<div class="container">
    <!-- Branding -->
    <header class="logo-header">
        <a href="/">
            <img src="FalconLogo.png" alt="FalconElite Logo" class="brand-logo">
        </a>
    </header>

    <h1>FalconElite</h1>
    <p class="tagline">Daily Live Streamer. Veteran operator specializing in high-fidelity space simulation and tactical maneuvers.</p>

    <!-- Twitch Live Feed -->
    <div class="stream-wrapper">
        <div id="twitch-embed"></div>
    </div>

    <!-- Navigation -->
    <div class="link-group">
        <a href="https://twitch.tv/FalconElite" class="btn">Watch Live on Twitch</a>
        <a href="https://youtube.com/@FalconElite" class="btn">YouTube Database</a>
        <a href="https://robertsspaceindustries.com" class="btn">Join BELLICUS Org</a>
    </div>
</div>

<!-- Load Twitch API -->
<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
    new Twitch.Embed("twitch-embed", {
        width: "100%",
        height: "100%",
        channel: "FalconElite",
        layout: "video",
        autoplay: false,
        // REPLACE 'localhost' WITH YOUR ACTUAL GITHUB PAGES DOMAIN (e.g., 'falconelite.github.io')
        parent: ["localhost"] 
    });
</script>

</body>
</html>
