<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nest | FalconElite</title>
    <!-- Twitch Embed SDK -->
    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <style>
        :root {
            --bg-color: #050507;
            --accent-red: #ff3e3e;
            --text-main: #e0e0e0;
            --card-border: #333;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .hub-container { 
            width: 100%; 
            max-width: 700px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Branding Anchor */
        .avatar-img { 
            width: 120px; 
            border-radius: 50%; 
            border: 2px solid var(--card-border);
            transition: var(--transition);
        }
        .avatar-link.is-live .avatar-img { 
            border-color: var(--accent-red); 
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.3);
        }

        /* Header Info */
        .header-info { text-align: center; }
        .streak-counter { font-size: 1.5rem; letter-spacing: 2px; margin-top: 10px; }
        .live-badge { display: none; color: var(--accent-red); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .live-badge.is-live { display: block; }
        .game-info { font-size: 0.9rem; color: #888; margin-top: 5px; display: none; }
        .game-info.is-live { display: block; }

        /* Stream Module */
        .stream-embed {
            width: 100%;
            display: none; 
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-top: 10px;
        }
        .stream-embed.is-live { display: block; }
        #twitchPlayer { width: 100%; aspect-ratio: 16 / 9; }
    </style>
</head>
<body>

<div class="hub-container">
    <!-- Branding Anchor -->
    <a id="avatarLink" href="https://twitch.tv/falconelite" class="avatar-link">
        <img src="FalconLogo.png" alt="FalconElite" class="avatar-img">
    </a>

    <!-- Status & Streak (Always Visible) -->
    <div class="header-info">
        <div id="liveBadge" class="live-badge">● Live Now</div>
        <div id="gameInfo" class="game-info">Playing: <span id="gameName">...</span></div>
        <div class="streak-counter">Streak: <span id="streakCount">0</span> Days</div>
    </div>

    <!-- Stream Module (Appears when live) -->
    <div id="streamEmbed" class="stream-embed">
        <div id="twitchPlayer"></div>
    </div>
</div>

<script>
    // 1. Streak Logic
    function updateStreak() {
        const startDate = new Date('2019-01-02');
        const today = new Date();
        const diffTime = Math.abs(today - startDate);
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById('streakCount').textContent = diffDays;
    }

    // 2. Twitch API Integration
    async function checkTwitchData() {
        try {
            const statusRes = await fetch('https://decapi.me/twitch/uptime/falconelite');
            const statusText = await statusRes.text();
            
            if (statusRes.ok && !statusText.includes('offline') && !statusText.includes('not found')) {
                // UI Activation
                document.getElementById('liveBadge').classList.add('is-live');
                document.getElementById('avatarLink').classList.add('is-live');
                
                // Show Embed
                const embedDiv = document.getElementById('streamEmbed');
                embedDiv.classList.add('is-live');
                new Twitch.Embed("twitchPlayer", {
                    width: "100%", height: "100%",
                    channel: "falconelite",
                    layout: "video",
                    muted: true,
                    autoplay: true
                });
                
                // Fetch Game
                const gameRes = await fetch('https://decapi.me/twitch/game/falconelite');
                document.getElementById('gameName').textContent = await gameRes.text();
                document.getElementById('gameInfo').classList.add('is-live');
            }
        } catch (err) { console.log('API check failed'); }
    }

    // Initialize
    updateStreak();
    checkTwitchData();
</script>
</body>
</html>
