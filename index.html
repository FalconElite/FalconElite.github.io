<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nest | FalconElite</title>
    
    <!-- Google Fonts & FontAwesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. ROOT VARIABLES
           ========================================================================== */
        :root {
            --bg-base: #050507;
            --card-bg: rgba(18, 20, 26, 0.85);
            --card-border: rgba(255, 255, 255, 0.12);
            --card-border-hover: rgba(255, 255, 255, 0.35);
            
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            
            --live-red: #ff3b30;
            --radius-main: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Register custom property for light rotation */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        /* ==========================================================================
           2. BASE RESET & ATMOSPHERIC STORM
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.05) 0%, transparent 60%),
                radial-gradient(circle at 20% 80%, rgba(200, 210, 225, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 60%, rgba(200, 210, 225, 0.03) 0%, transparent 50%);
            z-index: -4;
            animation: stormAtmosphere 12s infinite ease-in-out;
        }

        /* Lightning Effect */
        body::after {
            content: '';
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.22) 0%, transparent 70%),
                radial-gradient(circle at 85% 25%, rgba(255, 255, 255, 0.18) 0%, transparent 65%);
            filter: blur(40px); opacity: 0; z-index: -2;
            animation: fullScreenLightning 10s infinite;
        }

        /* ==========================================================================
           3. FOG & ANIMATIONS
           ========================================================================== */
        .fog-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; overflow: hidden; }
        .fog-layer-1, .fog-layer-2 { position: absolute; width: 200%; height: 140%; filter: blur(60px); opacity: 0.6; }
        .fog-layer-1 { top: -20%; background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 70%); animation: rollFogRight 28s linear infinite alternate; }
        .fog-layer-2 { bottom: -30%; background: radial-gradient(ellipse, rgba(200,215,230,0.08) 0%, transparent 75%); animation: rollFogLeft 35s linear infinite alternate; }

        @keyframes stormAtmosphere { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        @keyframes fullScreenLightning { 0%, 86%, 94%, 100% { opacity: 0; } 87% { opacity: 0.6; } 89% { opacity: 0.95; } }
        @keyframes rollFogRight { 0% { transform: translateX(0); } 100% { transform: translateX(30%); } }
        @keyframes rollFogLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-35%); } }

        /* ==========================================================================
           4. MAIN CONTENT
           ========================================================================== */
        .container { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 24px; z-index: 1; }
        .profile-header { display: flex; flex-direction: column; align-items: center; text-align: center; }

        .avatar-link { position: relative; margin-bottom: 20px; }
        .avatar-img { width: 180px; height: 180px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); box-shadow: 0 0 35px rgba(255,255,255,0.12); transition: var(--transition); }
        .avatar-link:hover .avatar-img { transform: scale(1.03); border-color: rgba(255,255,255,0.7); }

        .live-badge { position: absolute; bottom: 8px; right: 8px; background: var(--live-red); color: white; font-size: 0.7rem; font-weight: 800; padding: 4px 10px; border-radius: 20px; display: none; align-items: center; gap: 5px; border: 2px solid var(--bg-base); }
        .live-badge.is-live { display: flex; }
        .live-dot { width: 7px; height: 7px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .profile-title { font-size: 2.8rem; font-weight: 800; margin-bottom: 8px; }
        .profile-subtext { font-size: 0.95rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Streak Badge */
        .streak-badge { margin-top: 24px; position: relative; display: inline-flex; align-items: center; gap: 10px; padding: 10px 22px; border-radius: 30px; background: var(--card-bg); font-weight: 600; cursor: default; }
        .streak-badge::before { content: ''; position: absolute; inset: -1.5px; border-radius: 32px; padding: 1.5px; background: conic-gradient(from var(--angle), transparent 70%, #fff 95%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; animation: rotateLight 4s linear infinite; }
        @keyframes rotateLight { to { --angle: 360deg; } }
        .streak-icon { color: #ff9500; }

        /* Social Grid */
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 30px; width: 100%; max-width: 320px; }
        .social-btn { display: flex; justify-content: center; align-items: center; height: 55px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border); border-radius: var(--radius-main); color: var(--text-primary); font-size: 1.4rem; transition: var(--transition); }
        .social-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.4); transform: translateY(-4px); }
        .social-btn:hover[title="Twitch"] { box-shadow: 0 0 20px #9146ff; border-color: #9146ff; }
        .social-btn:hover[title="YouTube"] { box-shadow: 0 0 20px #ff0000; border-color: #ff0000; }
        .social-btn:hover[title="TikTok"] { box-shadow: 0 0 20px #00f2ea; border-color: #00f2ea; }
        .social-btn:hover[title="Twitter/X"] { box-shadow: 0 0 20px #ffffff; border-color: #ffffff; }
    </style>
</head>
<body>

    <div class="fog-container">
        <div class="fog-layer-1"></div>
        <div class="fog-layer-2"></div>
    </div>

    <div class="container">
        <header class="profile-header">
            <a href="https://twitch.tv/FalconElite" class="avatar-link">
                <img src="FalconLogo.png" alt="FalconElite" class="avatar-img">
                <div id="liveBadge" class="live-badge"><span class="live-dot"></span> LIVE</div>
            </a>

            <div class="profile-info">
                <h1 class="profile-title">FalconElite</h1>
                <p class="profile-subtext">Welcome to The Nest</p>

                <div class="streak-badge">
                    <i class="fa-solid fa-fire streak-icon"></i>
                    <span><span id="streakDays">---</span> Day Stream Streak</span>
                </div>

                <div class="social-grid">
                    <a href="https://twitch.tv/FalconElite" class="social-btn" title="Twitch"><i class="fab fa-twitch"></i></a>
                    <a href="https://youtube.com/@FalconElite" class="social-btn" title="YouTube"><i class="fab fa-youtube"></i></a>
                    <a href="https://tiktok.com/@FalconElite" class="social-btn" title="TikTok"><i class="fab fa-tiktok"></i></a>
                    <a href="https://twitter.com/FalconElite" class="social-btn" title="Twitter/X"><i class="fab fa-x-twitter"></i></a>
                </div>
            </div>
        </header>
    </div>

    <script>
        // Streak Calculator
        function updateStreamStreak() {
            const startDate = new Date('2019-01-02T00:00:00');
            const today = new Date();
            const diffDays = Math.floor(Math.abs(today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            document.getElementById('streakDays').textContent = diffDays.toLocaleString();
        }

        // Live Status Check
        async function checkTwitchStatus() {
            try {
                const response = await fetch('https://decapi.me/twitch/uptime/falconelite');
                const text = await response.text();
                if (response.ok && !text.includes('offline') && !text.includes('not found')) {
                    document.getElementById('liveBadge').classList.add('is-live');
                }
            } catch (err) { console.log('Live check failed'); }
        }

        updateStreamStreak();
        checkTwitchStatus();
    </script>
</body>
</html>
