<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nest | FalconElite</title>
    
    <!-- Google Fonts & Updated FontAwesome 6.6.0 CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. ROOT VARIABLES
           ========================================================================== */
        :root {
            --bg-base: #050507;
            --card-bg: rgba(18, 20, 26, 0.85);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --live-red: #ff3b30;
            --radius-main: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }

        /* ==========================================================================
           2. BASE RESET & ATMOSPHERE
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px; overflow-x: hidden; }

        /* Background Effects */
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.05) 0%, transparent 60%); z-index: -4; animation: storm 12s infinite; }
        .fog-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; overflow: hidden; pointer-events: none; }
        .fog { position: absolute; width: 200%; height: 140%; filter: blur(60px); opacity: 0.6; background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 70%); top: -20%; }

        /* ==========================================================================
           3. COMPONENTS
           ========================================================================== */
        .container { width: 100%; max-width: 680px; display: flex; flex-direction: column; align-items: center; z-index: 1; text-align: center; }
        .avatar-img { width: 180px; height: 180px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); margin-bottom: 20px; box-shadow: 0 0 35px rgba(255,255,255,0.12); }
        
        .live-badge { background: var(--live-red); color: white; font-size: 0.7rem; font-weight: 800; padding: 4px 12px; border-radius: 20px; display: none; align-items: center; gap: 6px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .live-badge.is-live { display: flex; }
        .live-dot { width: 8px; height: 8px; background: white; border-radius: 50%; box-shadow: 0 0 8px white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .profile-title { font-size: 2.8rem; font-weight: 800; margin-bottom: 5px; }
        .profile-subtext { font-size: 0.95rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        
        /* Streak Badge */
        .streak-badge { position: relative; display: inline-flex; align-items: center; gap: 10px; padding: 10px 22px; border-radius: 30px; background: var(--card-bg); font-weight: 600; border: 1px solid var(--card-border); }
        .streak-badge::before { content: ''; position: absolute; inset: -1.5px; border-radius: 32px; padding: 1.5px; background: conic-gradient(from var(--angle), transparent 70%, #fff 95%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; animation: rotateLight 4s linear infinite; }
        @keyframes rotateLight { to { --angle: 360deg; } }

        /* Social Grid */
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 30px; width: 100%; max-width: 320px; }
        .social-btn { display: flex; justify-content: center; align-items: center; height: 55px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border); border-radius: var(--radius-main); color: var(--text-primary); font-size: 1.4rem; transition: var(--transition); text-decoration: none; }
        .social-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-4px); }
        .social-btn:hover[title="Twitch"] { box-shadow: 0 0 20px #9146ff; border-color: #9146ff; }
        .social-btn:hover[title="YouTube"] { box-shadow: 0 0 20px #ff0000; border-color: #ff0000; }
        .social-btn:hover[title="TikTok"] { box-shadow: 0 0 20px #00f2ea; border-color: #00f2ea; }
        .social-btn:hover[title="Twitter/X"] { box-shadow: 0 0 20px #ffffff; border-color: #ffffff; }
    </style>
</head>
<body>

    <div class="fog-container"><div class="fog"></div></div>

    <div class="container">
        <img src="FalconLogo.png" alt="FalconElite" class="avatar-img">
        <div id="liveBadge" class="live-badge"><span class="live-dot"></span> LIVE</div>
        
        <h1 class="profile-title">FalconElite</h1>
        <p class="profile-subtext">Welcome to The Nest</p>

        <div class="streak-badge">
            <i class="fa-solid fa-fire" style="color: #ff9500;"></i>
            <span><span id="streakDays">---</span> Day Stream Streak</span>
        </div>

        <div class="social-grid">
            <a href="https://twitch.tv/FalconElite" class="social-btn" title="Twitch"><i class="fab fa-twitch"></i></a>
            <a href="https://youtube.com/@FalconElite" class="social-btn" title="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="https://tiktok.com/@FalconElite" class="social-btn" title="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="https://twitter.com/TheFalconElite" class="social-btn" title="Twitter/X"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </div>

    <script>
        // Streak Calculator
        const diffDays = Math.floor(Math.abs(new Date() - new Date('2019-01-02T00:00:00')) / (1000 * 60 * 60 * 24)) + 1;
        document.getElementById('streakDays').textContent = diffDays.toLocaleString();

        // Live Status Check
        fetch('https://decapi.me/twitch/uptime/falconelite')
            .then(res => res.text())
            .then(text => {
                if (text && !text.includes('offline') && !text.includes('not found')) {
                    document.getElementById('liveBadge').classList.add('is-live');
                }
            });
    </script>
</body>
</html>
