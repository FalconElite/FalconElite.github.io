<div class="section-label">Broadcast Feeds</div>

<!-- Responsive 16:9 Stream Wrapper -->
<div class="stream-container">
  <div id="twitch-embed"></div>
</div>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
  new Twitch.Embed("twitch-embed", {
    width: "100%",
    height: "100%", // Inherits from the container
    channel: "FalconElite",
    layout: "video",
    autoplay: false,
    parent: ["localhost"] // REMINDER: Update this to your live domain
  });
</script>

<style>
  /* The container forces a 16:9 aspect ratio */
  .stream-container {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 Ratio */
    background: var(--imperial-panel);
    border: 1px solid var(--imperial-edge);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  /* The actual embed is stretched to fill the 16:9 box */
  #twitch-embed {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>
